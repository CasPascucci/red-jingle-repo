name: Sync Upstream & Fill Regex

# ─── Triggers ───────────────────────────────────────────────────────────────
on:
  schedule:
    # Runs every Monday at 06:00 UTC — adjust to taste
    - cron: "0 6 * * 1"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print changes without committing)"
        type: boolean
        default: false

# ─── Permissions ────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to push the updated index.json back

# ─── Job ────────────────────────────────────────────────────────────────────
jobs:
  update-regex:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo (full history so upstream merges work cleanly)
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2. Set git identity globally — needed before any git commit/merge
      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 3. Optionally sync from an upstream repo.
      #    For index.json specifically, always take the upstream version —
      #    our only "changes" to it are regex fields added by this script,
      #    so the right strategy is: accept upstream's content, then re-fill regex.
      - name: Sync upstream
        if: vars.UPSTREAM_URL != ''
        run: |
          echo "Adding upstream remote: ${{ vars.UPSTREAM_URL }}"
          git remote add upstream "${{ vars.UPSTREAM_URL }}"
          git fetch upstream

          DEFAULT_BRANCH=$(git remote show upstream | awk '/HEAD branch/ {print $NF}')
          echo "Upstream default branch: $DEFAULT_BRANCH"

          # Merge, but on any conflict in index.json take the upstream version.
          # Our regex fields will be re-added by fill_regex.py in the next step.
          git merge "upstream/$DEFAULT_BRANCH" --no-edit --allow-unrelated-histories -X theirs || true

          # If there are still unresolved conflicts, force-take upstream's index.json
          if git ls-files --unmerged | grep -q index.json; then
            echo "Conflict remains in index.json — taking upstream version"
            git checkout upstream/$DEFAULT_BRANCH -- index.json
            git add index.json
            git commit -m "chore: accept upstream index.json (regex will be re-filled)"
          fi

      # 4. Python + dependencies
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      # 5. Run the regex filler
      - name: Fill regex fields
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python scripts/fill_regex.py $DRY_RUN_FLAG

      # 6. Commit and push if index.json was modified
      - name: Commit and push changes
        if: inputs.dry_run != true
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add index.json
          if git diff --cached --quiet; then
            echo "No changes to commit — all entries already had regex fields."
          else
            git commit -m "chore: fill regex fields for new jingle entries — auto-generated by fill_regex.py"
            git push
          fi
