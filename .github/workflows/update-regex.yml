name: Sync Upstream & Fill Regex

# ─── Triggers ───────────────────────────────────────────────────────────────
on:
  schedule:
    # Runs every Monday at 06:00 UTC — adjust to taste
    - cron: "0 6 * * 1"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print changes without committing)"
        type: boolean
        default: false

# ─── Permissions ────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to push the updated index.json back

# ─── Job ────────────────────────────────────────────────────────────────────
jobs:
  update-regex:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo (full history so upstream merges work cleanly)
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2. Optionally sync from an upstream repo.
      #    Set the UPSTREAM_URL repository variable in:
      #    Settings → Secrets and variables → Actions → Variables
      #    Leave it empty if this repo is not a fork or you don't want auto-sync.
      - name: Sync upstream
        if: vars.UPSTREAM_URL != ''
        run: |
          echo "Adding upstream remote: ${{ vars.UPSTREAM_URL }}"
          git remote add upstream "${{ vars.UPSTREAM_URL }}"
          git fetch upstream

          # Try merging main; fall back to master
          DEFAULT_BRANCH=$(git remote show upstream | awk '/HEAD branch/ {print $NF}')
          echo "Upstream default branch: $DEFAULT_BRANCH"
          git merge "upstream/$DEFAULT_BRANCH" --no-edit --allow-unrelated-histories

      # 3. Python + dependencies
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      # 4. Run the regex filler
      - name: Fill regex fields
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python scripts/fill_regex.py $DRY_RUN_FLAG

      # 5. Commit and push if index.json was modified
      - name: Commit and push changes
        if: inputs.dry_run != true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          if git diff --cached --quiet; then
            echo "No changes to commit — all entries already had regex fields."
          else
            CHANGED=$(git diff --cached --stat index.json)
            git commit -m "chore: fill regex fields for new jingle entries — auto-generated by fill_regex.py"
            git push
          fi
