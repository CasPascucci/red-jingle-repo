name: Sync Upstream & Fill Regex

# ─── Triggers ───────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 6 * * 1"  # managed automatically — do not edit this line by hand

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print changes without committing)"
        type: boolean
        default: false

# ─── Permissions ────────────────────────────────────────────────────────────
permissions:
  contents: write

# ─── Job ────────────────────────────────────────────────────────────────────
jobs:
  update-regex:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2. Git identity
      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 3. Sync upstream
      - name: Sync upstream
        if: vars.UPSTREAM_URL != ''
        run: |
          echo "Adding upstream remote: ${{ vars.UPSTREAM_URL }}"
          git remote add upstream "${{ vars.UPSTREAM_URL }}"
          git fetch upstream

          DEFAULT_BRANCH=$(git remote show upstream | awk '/HEAD branch/ {print $NF}')
          echo "Upstream default branch: $DEFAULT_BRANCH"

          git merge "upstream/$DEFAULT_BRANCH" --no-edit --allow-unrelated-histories -X theirs || true

          if git ls-files --unmerged | grep -q index.json; then
            echo "Conflict remains in index.json — taking upstream version"
            git checkout upstream/$DEFAULT_BRANCH -- index.json
            git add index.json
            git commit -m "chore: accept upstream index.json (regex will be re-filled)"
          fi

      # 4. Python + dependencies
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      # 5. Fill regex fields — capture whether anything was added
      - name: Fill regex fields
        id: fill
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          OUTPUT=$(python scripts/fill_regex.py $DRY_RUN_FLAG)
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "Nothing to do\|all entries already"; then
            echo "new_entries=false" >> $GITHUB_OUTPUT
          else
            echo "new_entries=true" >> $GITHUB_OUTPUT
          fi

      # 6. Commit regex changes
      - name: Commit regex changes
        if: inputs.dry_run != true
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add index.json
          if git diff --cached --quiet; then
            echo "No regex changes to commit."
          else
            git commit -m "chore: fill regex fields for new jingle entries — auto-generated by fill_regex.py"
            git push
          fi

      # 7. Update schedule based on whether new entries were found
      - name: Update sync schedule
        if: inputs.dry_run != true
        run: |
          STATE_FILE=".github/sync-state.json"

          # Load or initialise state
          if [ -f "$STATE_FILE" ]; then
            INTERVAL=$(python3 -c "import json,sys; d=json.load(open('$STATE_FILE')); print(d.get('interval','weekly'))")
            EMPTY_RUNS=$(python3 -c "import json,sys; d=json.load(open('$STATE_FILE')); print(d.get('empty_runs',0))")
          else
            INTERVAL="weekly"
            EMPTY_RUNS=0
          fi

          NEW_ENTRIES="${{ steps.fill.outputs.new_entries }}"
          echo "Current interval: $INTERVAL | Empty runs: $EMPTY_RUNS | New entries: $NEW_ENTRIES"

          # State machine
          if [ "$NEW_ENTRIES" = "true" ]; then
            INTERVAL="weekly"
            EMPTY_RUNS=0
            echo "New entries found — resetting to weekly"
          else
            EMPTY_RUNS=$((EMPTY_RUNS + 1))
            if [ "$INTERVAL" = "weekly" ] && [ "$EMPTY_RUNS" -ge 1 ]; then
              INTERVAL="biweekly"
              EMPTY_RUNS=0
              echo "No change for 1 week — stepping down to biweekly"
            elif [ "$INTERVAL" = "biweekly" ] && [ "$EMPTY_RUNS" -ge 1 ]; then
              INTERVAL="monthly"
              EMPTY_RUNS=0
              echo "No change for 2 weeks — stepping down to monthly"
            else
              echo "Interval unchanged: $INTERVAL"
            fi
          fi

          # Map interval to cron expression
          case "$INTERVAL" in
            weekly)   CRON="0 6 * * 1"   ;;
            biweekly) CRON="0 6 1,15 * *" ;;
            monthly)  CRON="0 6 1 * *"   ;;
          esac

          echo "New cron: $CRON"

          # Save state
          python3 -c "
          import json
          state = {'interval': '$INTERVAL', 'empty_runs': $EMPTY_RUNS, 'cron': '$CRON'}
          json.dump(state, open('$STATE_FILE', 'w'), indent=2)
          print('Wrote', '$STATE_FILE')
          "

          # Rewrite the cron line in this workflow file
          WORKFLOW=".github/workflows/update-regex.yml"
          sed -i "s|    - cron: \".*\"  # managed automatically.*|    - cron: \"$CRON\"  # managed automatically — do not edit this line by hand|" "$WORKFLOW"

          echo "Updated workflow cron to: $CRON"

          # Commit state + workflow changes
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add "$STATE_FILE" "$WORKFLOW"
          if git diff --cached --quiet; then
            echo "No schedule changes to commit."
          else
            git commit -m "chore: update sync schedule to $INTERVAL ($CRON)"
            git push
          fi
